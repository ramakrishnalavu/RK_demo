spring.application.name=moviebooking

# Database Configuration
# Render provides DATABASE_URL, but we use the specific ones if available
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:movie_booking_super_secret_key_for_jwt_2024_very_long_secure_string}
app.jwt.expiration=86400000

# CORS Configuration
# Allowed origins will be set via environment variable in production
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}