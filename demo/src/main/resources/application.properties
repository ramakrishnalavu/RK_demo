spring.application.name=moviebooking

# Database Configuration (PostgreSQL)
# Using environment variables for security. Render will provide these.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:movie_booking_super_secret_key_for_jwt_2024_very_long_secure_string}
app.jwt.expiration=86400000

# CORS Configuration
# Allowed origins will be set via environment variable in production
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}