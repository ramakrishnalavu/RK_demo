services:
  # Backend: Spring Boot Web Service
  - type: web
    name: movie-booking-backend
    env: docker
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # User will need to update this or Render will detect it
    plan: free
    region: oregon
    dockerContext: demo
    dockerfilePath: demo/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: rk-demo-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: rk-demo-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: rk-demo-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: static_site
          name: movie-booking-frontend
          property: host

  # Frontend: React Static Site
  - type: static_site
    name: movie-booking-frontend
    repo: https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: client/dist
    rootDir: client
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: movie-booking-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: rk-demo-db
    plan: free
    region: oregon
